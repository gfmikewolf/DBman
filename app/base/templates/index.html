<!-- app/base/templates/index.html -->
{% extends 'base.html' %}
{% set prev_page = None %}
{% set APP_title = PageText['PageTitle'] %}
{% set APP_index = '/' %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">{{ PageText['APPs'] }}</div>
                <div class="card-body">
                    <div class="list-group">
                        <a href="/admin" class="list-group-item list-group-item-action">{{ PageText['Admin']['PageTitle'] }}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
