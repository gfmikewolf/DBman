<!-- app/base/templates/index.html -->
{% extends 'base.html' %}
{% set prev_page = None %}
{% set active_level = 'Home' %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 col-sm-12">
            <div class="card">
                <div class="card-header">{{ PageText['APPs'] }}</div>
                <div class="card-body">
                    <div class="list-group">
                        <a href="{{ url_for('base.admin.admin_index')}}" \
                            class="list-group-item list-group-item-action">
                            {{ PageText['Admin']['PageTitle'] }}
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
